<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Ready — Kitchen App</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #111210;
    --surface:   #1c1e1a;
    --surface2:  #252722;
    --border:    #2e3029;
    --orange:    #e8681a;
    --orange-dim:#a84b10;
    --green:     #4caf6e;
    --green-dim: #2d6b42;
    --text:      #e8e6e1;
    --muted:     #7a7d72;
    --danger:    #c0392b;
    --radius:    10px;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Inter', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 12px;
    flex-wrap: wrap;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 34px; height: 34px;
    background: var(--orange);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .order-count {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
  }

  .order-count span {
    color: var(--orange);
    font-weight: 700;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .tab {
    flex: 1;
    padding: 12px 16px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: none;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.03em;
  }

  .tab.active {
    color: var(--orange);
    border-bottom-color: var(--orange);
  }

  /* ── PANELS ── */
  .panel { display: none; flex: 1; flex-direction: column; }
  .panel.active { display: flex; }

  /* ── ADD ORDER PANEL ── */
  .add-panel {
    padding: 20px;
    gap: 16px;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }

  label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  input[type="text"], input[type="tel"], textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 16px;
    color: var(--text);
    font-family: var(--sans);
    width: 100%;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  input[type="text"]:focus, input[type="tel"]:focus, textarea:focus {
    outline: none;
    border-color: var(--orange);
  }

  input.order-num-input {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--orange);
    text-align: center;
  }

  textarea {
    resize: vertical;
    min-height: 80px;
    font-size: 14px;
    line-height: 1.5;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 20px;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
    width: 100%;
    font-family: var(--sans);
    letter-spacing: 0.02em;
  }

  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: var(--orange);
    color: #fff;
  }

  .btn-primary:hover:not(:disabled) { opacity: 0.9; }

  .btn-ready {
    background: var(--green);
    color: #fff;
    font-size: 17px;
    padding: 16px 20px;
  }

  .btn-ready:hover:not(:disabled) { opacity: 0.9; }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
    padding: 8px 14px;
    font-size: 13px;
    width: auto;
  }

  .btn-danger:hover { background: rgba(192,57,43,0.1); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0 16px;
  }

  /* ── MESSAGE SETTINGS ── */
  .msg-preview {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    margin-top: 6px;
    font-style: italic;
  }

  .msg-preview strong {
    color: var(--orange);
    font-style: normal;
    font-family: var(--mono);
    font-size: 12px;
  }

  /* ── QUEUE PANEL ── */
  .queue-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .queue-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }

  .queue-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 10px;
    padding: 40px 20px;
    text-align: center;
  }

  .empty-icon { font-size: 40px; opacity: 0.4; }
  .empty-state p { font-size: 14px; }

  /* ── ORDER CARD ── */
  .order-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .order-card.sent {
    opacity: 0.5;
    border-color: var(--green-dim);
  }

  .order-card-top {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
  }

  .order-badge {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 20px;
    color: var(--orange);
    background: rgba(232,104,26,0.12);
    border-radius: 8px;
    padding: 6px 12px;
    min-width: 64px;
    text-align: center;
    flex-shrink: 0;
  }

  .order-info {
    flex: 1;
    min-width: 0;
  }

  .order-name {
    font-weight: 600;
    font-size: 16px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .order-phone {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .order-time {
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
    text-align: right;
  }

  .order-card-actions {
    display: flex;
    gap: 10px;
    padding: 0 16px 14px;
  }

  .sent-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--green);
    padding: 6px 0 10px 16px;
  }

  /* ── SETTINGS PANEL ── */
  .settings-panel {
    padding: 20px;
    gap: 0;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--green);
    color: #fff;
    padding: 12px 20px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── RESPONSIVE ── */
  @media (min-width: 700px) {
    .tabs { max-width: 480px; margin: 0 auto; width: 100%; border-bottom: none; }
    header { padding: 14px 28px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🍕</div>
    <div>
      <div class="logo-text">ORDER FIRE</div>
      <div class="logo-sub">Kitchen Notify</div>
    </div>
  </div>
  <div class="header-right">
    <div class="order-count">Active: <span id="activeCount">0</span></div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('add')">➕ Add Order</button>
  <button class="tab" onclick="switchTab('queue')">🔥 Queue</button>
  <button class="tab" onclick="switchTab('settings')">⚙️ Settings</button>
</div>

<!-- ADD ORDER PANEL -->
<div class="panel add-panel active" id="tab-add">
  <div class="section-label">New Order</div>

  <div class="form-group">
    <label>Order #</label>
    <input type="text" id="orderNum" class="order-num-input" placeholder="e.g. 47" inputmode="numeric" autocomplete="off">
  </div>

  <div class="form-group">
    <label>Customer Name</label>
    <input type="text" id="custName" placeholder="First name" autocomplete="off" autocapitalize="words">
  </div>

  <div class="form-group">
    <label>Phone Number</label>
    <input type="tel" id="custPhone" placeholder="(555) 867-5309" autocomplete="off">
  </div>

  <button class="btn btn-primary" onclick="addOrder()">Add to Queue</button>
</div>

<!-- QUEUE PANEL -->
<div class="panel queue-panel" id="tab-queue">
  <div class="queue-header">
    <span class="section-label" style="margin:0">Active Orders</span>
    <button class="btn btn-danger" style="padding:6px 12px;font-size:12px" onclick="clearSent()">Clear Sent</button>
  </div>
  <div class="queue-list" id="queueList">
    <div class="empty-state">
      <div class="empty-icon">🫙</div>
      <p>No orders yet.<br>Add one from the Add Order tab.</p>
    </div>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div class="panel settings-panel" id="tab-settings">
  <div class="section-label">Ready Message</div>
  <p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5;">
    This message is sent when you tap <strong style="color:var(--green)">Order Ready</strong>. Use <strong style="color:var(--orange);">{name}</strong> to insert the customer's name and <strong style="color:var(--orange);">{order}</strong> for the order number.
  </p>

  <div class="form-group">
    <label>Message Template</label>
    <textarea id="msgTemplate" placeholder="Your order #{order} is ready! Come on up, {name} 🍕" oninput="updatePreview()"></textarea>
  </div>

  <div class="msg-preview" id="msgPreview"></div>

  <div class="divider" style="margin-top:16px;"></div>

  <div class="section-label" style="margin-top:16px;">Restaurant Name</div>
  <div class="form-group">
    <label>Name (optional, shown in header)</label>
    <input type="text" id="restaurantName" placeholder="Pizza Kitchen" oninput="updateRestaurantName()" autocapitalize="words">
  </div>

  <button class="btn btn-primary" style="margin-top:8px" onclick="saveSettings()">Save Settings</button>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── STATE ──
  let orders = JSON.parse(localStorage.getItem('ok_orders') || '[]');
  let settings = JSON.parse(localStorage.getItem('ok_settings') || '{}');

  const DEFAULT_MSG = "Hey {name}, your order #{order} is ready for pickup! 🍕";

  function getMsg() {
    return (settings.message || DEFAULT_MSG).trim() || DEFAULT_MSG;
  }

  // ── INIT ──
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('msgTemplate').value = settings.message || DEFAULT_MSG;
    if (settings.restaurantName) {
      document.getElementById('restaurantName').value = settings.restaurantName;
      document.querySelector('.logo-sub').textContent = settings.restaurantName;
    }
    updatePreview();
    renderQueue();
  });

  // ── TABS ──
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.currentTarget.classList.add('active');
    if (name === 'queue') renderQueue();
  }

  // ── ADD ORDER ──
  function addOrder() {
    const orderNum = document.getElementById('orderNum').value.trim();
    const name     = document.getElementById('custName').value.trim();
    const phone    = document.getElementById('custPhone').value.trim().replace(/\D/g, '');

    if (!orderNum) return shake('orderNum', 'Enter an order number');
    if (!name)     return shake('custName', 'Enter a name');
    if (phone.length < 10) return shake('custPhone', 'Enter a valid phone number');

    const order = {
      id: Date.now(),
      orderNum,
      name,
      phone,
      time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
      sent: false
    };

    orders.unshift(order);
    save();

    // Clear form
    document.getElementById('orderNum').value = '';
    document.getElementById('custName').value = '';
    document.getElementById('custPhone').value = '';
    document.getElementById('orderNum').focus();

    showToast(`Order #${orderNum} added ✓`);
    updateCount();
  }

  // ── SEND TEXT ──
  function sendReady(id) {
    const order = orders.find(o => o.id === id);
    if (!order) return;

    const msg = getMsg()
      .replace(/{name}/g, order.name)
      .replace(/{order}/g, order.orderNum);

    const encoded = encodeURIComponent(msg);
    const phone = order.phone.replace(/\D/g, '');

    // Use sms: link — opens native Messages app with number + body pre-filled
    // iOS: sms:+1XXXXXXXXXX&body=...  Android: sms:+1XXXXXXXXXX?body=...
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const sep = isIOS ? '&' : '?';
    window.location.href = `sms:+1${phone}${sep}body=${encoded}`;

    // Mark as sent after brief delay (gives time for SMS app to open)
    setTimeout(() => {
      order.sent = true;
      save();
      renderQueue();
      showToast(`Text opened for ${order.name} ✓`, 'green');
    }, 800);
  }

  // ── REMOVE ORDER ──
  function removeOrder(id) {
    orders = orders.filter(o => o.id !== id);
    save();
    renderQueue();
    updateCount();
  }

  // ── CLEAR SENT ──
  function clearSent() {
    orders = orders.filter(o => !o.sent);
    save();
    renderQueue();
    updateCount();
  }

  // ── RENDER QUEUE ──
  function renderQueue() {
    const list = document.getElementById('queueList');
    updateCount();

    if (orders.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">🫙</div>
        <p>No orders yet.<br>Add one from the Add Order tab.</p>
      </div>`;
      return;
    }

    list.innerHTML = orders.map(o => `
      <div class="order-card ${o.sent ? 'sent' : ''}" id="card-${o.id}">
        <div class="order-card-top">
          <div class="order-badge">#${o.orderNum}</div>
          <div class="order-info">
            <div class="order-name">${escHtml(o.name)}</div>
            <div class="order-phone">${formatPhone(o.phone)}</div>
          </div>
          <div class="order-time">${o.time}</div>
        </div>
        ${o.sent
          ? `<div class="sent-badge">✅ Text sent</div>`
          : `<div class="order-card-actions">
               <button class="btn btn-ready" onclick="sendReady(${o.id})">📱 Order Ready — Text ${escHtml(o.name)}</button>
             </div>`
        }
        <div style="padding:0 16px 12px;display:flex;justify-content:flex-end">
          <button class="btn btn-danger" onclick="removeOrder(${o.id})">Remove</button>
        </div>
      </div>
    `).join('');
  }

  // ── SETTINGS ──
  function updatePreview() {
    const tmpl = document.getElementById('msgTemplate').value || DEFAULT_MSG;
    const preview = tmpl
      .replace(/{name}/g, '<strong>Maria</strong>')
      .replace(/{order}/g, '<strong>47</strong>');
    document.getElementById('msgPreview').innerHTML = `Preview: ${preview}`;
  }

  function updateRestaurantName() {
    const val = document.getElementById('restaurantName').value.trim();
    document.querySelector('.logo-sub').textContent = val || 'Kitchen Notify';
  }

  function saveSettings() {
    settings.message = document.getElementById('msgTemplate').value.trim() || DEFAULT_MSG;
    settings.restaurantName = document.getElementById('restaurantName').value.trim();
    localStorage.setItem('ok_settings', JSON.stringify(settings));
    showToast('Settings saved ✓');
    if (settings.restaurantName) {
      document.querySelector('.logo-sub').textContent = settings.restaurantName;
    }
  }

  // ── HELPERS ──
  function save() {
    localStorage.setItem('ok_orders', JSON.stringify(orders));
  }

  function updateCount() {
    const active = orders.filter(o => !o.sent).length;
    document.getElementById('activeCount').textContent = active;
  }

  function formatPhone(p) {
    const d = p.replace(/\D/g, '');
    if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
    return p;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function shake(id, msg) {
    const el = document.getElementById(id);
    el.style.borderColor = '#c0392b';
    el.focus();
    setTimeout(() => el.style.borderColor = '', 1200);
    showToast(msg, 'red');
  }

  function showToast(msg, color = 'green') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color === 'red' ? 'var(--danger)' : 'var(--green)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Format phone as user types
  document.getElementById('custPhone').addEventListener('input', function() {
    let val = this.value.replace(/\D/g, '').slice(0, 10);
    if (val.length >= 7) val = `(${val.slice(0,3)}) ${val.slice(3,6)}-${val.slice(6)}`;
    else if (val.length >= 4) val = `(${val.slice(0,3)}) ${val.slice(3)}`;
    else if (val.length >= 1) val = `(${val}`;
    this.value = val;
  });

  // Enter key to submit
  ['orderNum','custName','custPhone'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') addOrder();
    });
  });
</script>
</body>
</html>
